<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>IranAir Full Network Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1220;}
#map{height:100vh;width:100%;}

#sidebar{
 position:absolute;
 right:-420px;top:0;
 width:400px;height:100vh;
 background:rgba(10,15,25,0.96);
 backdrop-filter:blur(22px);
 color:white;padding:18px;
 transition:0.3s;overflow:auto;
 z-index:9999;
}
#sidebar.active{right:0;}

#tip{
 position:absolute;
 background:rgba(0,0,0,0.88);
 color:white;padding:8px 10px;
 border-radius:6px;font-size:12px;
 pointer-events:none;display:none;
 z-index:9999;
}

#filters{
 position:absolute;
 top:10px;left:10px;
 z-index:9999;
 background:rgba(20,25,40,0.85);
 backdrop-filter:blur(12px);
 padding:10px;border-radius:10px;
 color:white;font-size:13px;
}
#filters label{display:block;margin:3px 0;cursor:pointer;}

#legend{
 position:absolute;
 bottom:10px;left:10px;
 z-index:9999;
 background:rgba(20,25,40,0.85);
 padding:10px;border-radius:10px;
 color:white;font-size:12px;
}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;}
</style>
</head>

<body>

<div id="map"></div>

<div id="filters">
<b>Filters</b><br>
<label><input type="checkbox" checked onclick="toggle('Active')"> Active</label>
<label><input type="checkbox" checked onclick="toggle('Suspended')"> Suspended</label>
<label><input type="checkbox" checked onclick="toggle('Terminated')"> Terminated</label>
<label><input type="checkbox" checked onclick="toggle('Seasonal')"> Seasonal</label>
</div>

<div id="legend">
<b>Status</b><br>
<span class="dot" style="background:#2ecc71"></span>Active<br>
<span class="dot" style="background:#f39c12"></span>Suspended<br>
<span class="dot" style="background:#3498db"></span>Seasonal<br>
<span class="dot" style="background:#e74c3c"></span>Terminated
</div>

<div id="sidebar">
<div onclick="closeSidebar()" style="cursor:pointer;color:#aaa">✖ Close</div>
<div id="content"></div>
</div>

<div id="tip"></div>

<script>

const hub=[35.4161,51.1522];

// ================= FULL RESTORED DATASET =================
const DATA = {

/* EUROPE */
"London":[51.47,-0.45,"LHR","EGLL","Suspended",["IR710","IR711"],["IR711","IR710"]],
"Paris CDG":[49.00,2.54,"CDG","LFPG","Suspended",["IR732","IR733"],["IR733"]],
"Vienna":[48.11,16.56,"VIE","LOWW","Suspended",["IR716","IR717"],["IR717"]],
"Frankfurt":[50.03,8.56,"FRA","EDDF","Suspended",["IR720","IR721","IR723"],["IR721","IR723","IR720"]],
"Munich":[48.35,11.78,"MUC","EDDM","Suspended",["IR726"],["IR727"]],
"Rome":[41.80,12.23,"FCO","LIRF","Suspended",["IR740"],["IR741"]],
"Athens":[37.93,23.94,"ATH","LGAV","Terminated",["IR742"],["IR743"]],
"Stockholm":[59.65,17.92,"ARN","ESSA","Terminated",["IR712"],["IR713"]],
"Gothenburg":[57.66,12.28,"GOT","ESGG","Terminated",["IR734","IR726"],["IR735","IR727"]],
"Istanbul":[41.27,28.75,"IST","LTFM","Active",["IR718","IR719","IR768","IR769"],["IR718","IR719","IR768","IR769"]],
"Ankara":[40.12,32.99,"ESB","LTAC","Terminated",["IR762"],["IR763"]],
"Hamburg":[53.63,9.99,"HAM","EDDH","Suspended",["IR724"],["IR723"]],
"Cologne":[50.87,7.14,"CGN","EDDK","Suspended",["IR728"],["IR729"]],

/* MIDDLE EAST */
"Baku":[40.46,50.04,"GYD","UBBB","Active",["IR744"],["IR745"]],
"Yerevan":[40.14,44.39,"EVN","UDYZ","Seasonal",["IR736"],["IR737"]],
"Kuwait City":[29.22,47.96,"KWI","OKKK","Active",["IR652"],["IR653"]],
"Dubai":[25.25,55.36,"DXB","OMDB","Active",["IR658","IR676"],["IR657","IR675"]],
"Doha":[25.27,51.60,"DOH","OTHH","Active",["IR491"],["IR490"]],
"Kabul":[34.56,69.21,"KBL","OAKB","Terminated",["IR840"],["IR841"]],

/* ASIA */
"Karachi":[24.90,67.16,"KHI","OPKC","Active",["IR813"],["IR812"]],
"Mumbai":[19.08,72.87,"BOM","VABB","Active",["IR811"],["IR810"]],
"Bangkok":[13.69,100.75,"BKK","VTBS","Terminated",["IR805"],["IR804"]],
"Kuala Lumpur":[2.74,101.70,"KUL","WMKK","Terminated",["IR815"],["IR814"]],
"Singapore":[1.36,103.99,"SIN","WSSS","Terminated",["IR815E"],["IR814E"]],
"Beijing":[40.08,116.58,"PEK","ZBAA","Terminated",["IR801"],["IR800"]],
"Seoul":[37.46,126.44,"ICN","RKSI","Terminated",["IR801E"],["IR800E"]],
"Tokyo":[35.77,140.39,"NRT","RJAA","Terminated",["IR801"],["IR800"]],
"New York":[40.64,-73.78,"JFK","KJFK","Terminated",["IR202"],["IR201"]]

};

// ================= FILTERS =================
let filters={Active:true,Suspended:true,Terminated:true,Seasonal:true};
function toggle(t){filters[t]=!filters[t];render();}

// ================= MAP =================
const map=L.map('map').setView([30,20],3);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'&copy; OSM'
}).addTo(map);

// ================= CURVE =================
function curve(a,b,n=60){
 const [lat1,lon1]=a.map(x=>x*Math.PI/180);
 const [lat2,lon2]=b.map(x=>x*Math.PI/180);

 const d=2*Math.asin(Math.sqrt(
  Math.sin((lat1-lat2)/2)**2+
  Math.cos(lat1)*Math.cos(lat2)*Math.sin((lon1-lon2)/2)**2
 ));

 let out=[];
 for(let i=0;i<=n;i++){
  let f=i/n;
  let A=Math.sin((1-f)*d)/Math.sin(d);
  let B=Math.sin(f*d)/Math.sin(d);

  let x=A*Math.cos(lat1)*Math.cos(lon1)+B*Math.cos(lat2)*Math.cos(lon2);
  let y=A*Math.cos(lat1)*Math.sin(lon1)+B*Math.cos(lat2)*Math.sin(lon2);
  let z=A*Math.sin(lat1)+B*Math.sin(lat2);

  out.push([
   Math.atan2(z,Math.sqrt(x*x+y*y))*180/Math.PI,
   Math.atan2(y,x)*180/Math.PI
  ]);
 }
 return out;
}

// ================= UI =================
let lines=[],markers=[];
const tip=document.getElementById("tip");

function showTip(e,name,d){
 tip.style.display="block";
 tip.innerHTML=`
 <b>${name}</b><br>
 Inbound: ${d[5].join(", ")}<br>
 Outbound: ${d[6].join(", ")}<br>
 Status: ${d[4]}
 `;
 tip.style.left=e.originalEvent.pageX+10+"px";
 tip.style.top=e.originalEvent.pageY+10+"px";
}

function hideTip(){tip.style.display="none";}

function openSidebar(name,d){
 document.getElementById("sidebar").classList.add("active");
 document.getElementById("content").innerHTML=`
 <h2>${name}</h2>
 <p><b>IATA:</b> ${d[2]}<br>
 <b>ICAO:</b> ${d[3]}<br>
 <b>Status:</b> ${d[4]}</p>

 <p><b>Inbound:</b> ${d[5].join(", ")}<br>
 <b>Outbound:</b> ${d[6].join(", ")}</p>
 `;
}

function closeSidebar(){
 document.getElementById("sidebar").classList.remove("active");
}

// ================= RENDER =================
function render(){

 lines.forEach(l=>map.removeLayer(l));
 markers.forEach(m=>map.removeLayer(m));

 lines=[];markers=[];

 Object.entries(DATA).forEach(([name,d])=>{

  if(!filters[d[4]]) return;

  const path=curve(hub,[d[0],d[1]]);

  const line=L.polyline(path,{
   color:
    d[4]==="Active"?"#2ecc71":
    d[4]==="Suspended"?"#f39c12":
    d[4]==="Seasonal"?"#3498db":
    "#e74c3c",
   weight:2.5,
   opacity:0.9
  }).addTo(map);

  line.on("mouseover",()=>line.setStyle({weight:4,opacity:1}));
  line.on("mouseout",()=>line.setStyle({weight:2.5,opacity:0.9}));

  line.on("mousemove",(e)=>showTip(e,name,d));
  line.on("mouseout",hideTip);

  lines.push(line);

  const marker=L.circleMarker([d[0],d[1]],{
   radius:6,color:"#111",
   fillColor:"#fff",fillOpacity:1
  }).addTo(map);

  marker.on("mousemove",(e)=>showTip(e,name,d));
  marker.on("mouseout",hideTip);
  marker.on("click",()=>openSidebar(name,d));

  markers.push(marker);
 });
}

render();

</script>
</body>
</html>
