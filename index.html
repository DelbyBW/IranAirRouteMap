<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>IranAir Network Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1220;}
#map{height:100vh;width:100%;}

/* PANEL */
#panel{
 position:absolute;top:10px;left:10px;z-index:9999;
 background:rgba(20,25,40,0.9);
 color:white;padding:10px;border-radius:10px;
 backdrop-filter:blur(10px);
 font-size:13px;
 width:220px;
}

button{
 margin:3px;
 padding:6px 8px;
 border-radius:6px;
 border:none;
 cursor:pointer;
 width:100%;
 background:#555;
 color:white;
 transition:0.2s;
}
button.on{background:#2ecc71;}

#legend{
 margin-top:8px;
 border-top:1px solid rgba(255,255,255,0.2);
 padding-top:8px;
 font-size:12px;
}

.row{display:flex;align-items:center;margin:3px 0;}
.dot{width:10px;height:10px;border-radius:50%;margin-right:6px;}

/* SIDEBAR */
#sidebar{
 position:absolute;right:-380px;top:0;
 width:360px;height:100vh;
 background:rgba(10,15,25,0.96);
 backdrop-filter:blur(18px);
 color:white;padding:16px;
 transition:0.25s;
 overflow:auto;
 z-index:9999;
}
#sidebar.active{right:0;}

/* TOOLTIP */
#tip{
 position:absolute;
 background:rgba(0,0,0,0.85);
 color:white;
 padding:8px;
 border-radius:6px;
 font-size:12px;
 display:none;
 pointer-events:none;
 z-index:9999;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
<b>Filters</b>

<button class="on" onclick="toggleFilter('Active')">Active</button>
<button class="on" onclick="toggleFilter('Suspended')">Suspended</button>
<button class="on" onclick="toggleFilter('Seasonal')">Seasonal</button>
<button class="on" onclick="toggleFilter('Terminated')">Terminated</button>

<div id="legend">
<b>Status Legend</b>
<div class="row"><div class="dot" style="background:#2ecc71"></div>Active</div>
<div class="row"><div class="dot" style="background:#f39c12"></div>Suspended</div>
<div class="row"><div class="dot" style="background:#3498db"></div>Seasonal</div>
<div class="row"><div class="dot" style="background:#e74c3c"></div>Terminated</div>
</div>
</div>

<div id="sidebar">
<div onclick="closeSidebar()" style="cursor:pointer;color:#aaa">✖ Close</div>
<div id="content"></div>
</div>

<div id="tip"></div>

<script>

/* ================= HUB ================= */
const hub=[35.4161,51.1522];

/* ================= DATA ================= */
const DATA = [
{name:"London",lat:51.47,lon:-0.45,iata:"LHR",status:"Suspended",inbound:["IR710"],outbound:["IR711"]},
{name:"Paris",lat:48.85,lon:2.35,iata:"CDG",status:"Suspended",inbound:["IR732"],outbound:["IR733"]},
{name:"Frankfurt",lat:50.11,lon:8.68,iata:"FRA",status:"Suspended",inbound:["IR720"],outbound:["IR721"]},
{name:"Vienna",lat:48.21,lon:16.37,iata:"VIE",status:"Suspended",inbound:["IR716"],outbound:["IR717"]},
{name:"Istanbul",lat:41.01,lon:28.97,iata:"IST",status:"Active",inbound:["IR718","IR768"],outbound:["IR719","IR769"]},
{name:"Gothenburg",lat:57.66,lon:12.28,iata:"GOT",status:"Terminated",inbound:["IR726"],outbound:["IR727"]},
{name:"Munich",lat:48.35,lon:11.78,iata:"MUC",status:"Suspended",inbound:["IR736"],outbound:["IR737"]},
{name:"Rome",lat:41.80,lon:12.23,iata:"FCO",status:"Suspended",inbound:["IR738"],outbound:["IR739"]},
{name:"Stockholm",lat:59.65,lon:17.93,iata:"ARN",status:"Terminated",inbound:["IR712"],outbound:["IR713"]},
{name:"Hamburg",lat:53.63,lon:9.99,iata:"HAM",status:"Suspended",inbound:["IR722"],outbound:["IR723"]},
{name:"Amsterdam",lat:52.31,lon:4.76,iata:"AMS",status:"Suspended",inbound:["IR724"],outbound:["IR725"]},
{name:"Cologne",lat:50.94,lon:6.96,iata:"CGN",status:"Suspended",inbound:["IR728"],outbound:["IR729"]},
{name:"Madrid",lat:40.49,lon:-3.56,iata:"MAD",status:"Suspended",inbound:["IR730"],outbound:["IR731"]},
{name:"St. Petersburg",lat:59.80,lon:30.26,iata:"LED",status:"Terminated",inbound:["IR740"],outbound:["IR741"]},
{name:"Yerevan",lat:40.13,lon:44.39,iata:"EVN",status:"Seasonal",inbound:["IR742"],outbound:["IR743"]},
{name:"Belgrade",lat:44.82,lon:20.31,iata:"BEG",status:"Terminated",inbound:["IR744"],outbound:["IR745"]},
{name:"Baku",lat:40.46,lon:50.05,iata:"GYD",status:"Active",inbound:["IR748"],outbound:["IR749"]},
{name:"Kuwait City",lat:29.30,lon:47.98,iata:"KWI",status:"Active",inbound:["IR600"],outbound:["IR601"]},
{name:"Dubai",lat:25.25,lon:55.36,iata:"DXB",status:"Active",inbound:["IR659"],outbound:["IR658"]},
{name:"Doha",lat:25.27,lon:51.61,iata:"DOH",status:"Active",inbound:["IR621"],outbound:["IR620"]},
{name:"Kabul",lat:34.56,lon:69.21,iata:"KBL",status:"Terminated",inbound:["IR819"],outbound:["IR818"]},
{name:"Karachi",lat:24.90,lon:67.16,iata:"KHI",status:"Active",inbound:["IR813"],outbound:["IR812"]},
{name:"Mumbai",lat:19.08,lon:72.87,iata:"BOM",status:"Active",inbound:["IR811"],outbound:["IR810"]},
{name:"Singapore",lat:1.35,lon:103.99,iata:"SIN",status:"Terminated",inbound:["IR815E"],outbound:["IR814E"]},
{name:"Beijing",lat:40.08,lon:116.58,iata:"PEK",status:"Terminated",inbound:["IR801"],outbound:["IR800"]},
{name:"Seoul",lat:37.46,lon:126.44,iata:"ICN",status:"Terminated",inbound:["IR801E"],outbound:["IR800E"]},
{name:"Tokyo",lat:35.77,lon:140.39,iata:"NRT",status:"Terminated",inbound:["IR801"],outbound:["IR800"]},
{name:"New York",lat:40.64,lon:-73.78,iata:"JFK",status:"Terminated",inbound:["IR100"],outbound:["IR101"]}
];

/* ================= MAP ================= */
const map=L.map('map').setView([30,20],3);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OSM'
}).addTo(map);

let lines=[];
let markers=[];

let activeFilters={
 Active:true,
 Suspended:true,
 Seasonal:true,
 Terminated:true
};

const tip=document.getElementById("tip");

/* ================= HELPERS ================= */
function color(s){
 if(s==="Active") return "#2ecc71";
 if(s==="Suspended") return "#f39c12";
 if(s==="Seasonal") return "#3498db";
 return "#e74c3c";
}

function curve(a,b,n=80){
 const [lat1,lon1]=a,[lat2,lon2]=b;
 const toRad=x=>x*Math.PI/180;

 const φ1=toRad(lat1),λ1=toRad(lon1);
 const φ2=toRad(lat2),λ2=toRad(lon2);

 const d=2*Math.asin(Math.sqrt(
  Math.sin((φ2-φ1)/2)**2+
  Math.cos(φ1)*Math.cos(φ2)*Math.sin((λ2-λ1)/2)**2
 ));

 let pts=[];
 for(let i=0;i<=n;i++){
  let f=i/n;
  let A=Math.sin((1-f)*d)/Math.sin(d);
  let B=Math.sin(f*d)/Math.sin(d);

  let x=A*Math.cos(φ1)*Math.cos(λ1)+B*Math.cos(φ2)*Math.cos(λ2);
  let y=A*Math.cos(φ1)*Math.sin(λ1)+B*Math.cos(φ2)*Math.sin(λ2);
  let z=A*Math.sin(φ1)+B*Math.sin(φ2);

  pts.push([
   Math.atan2(z,Math.sqrt(x*x+y*y))*180/Math.PI,
   Math.atan2(y,x)*180/Math.PI
  ]);
 }
 return pts;
}

/* ================= UI ================= */
function showTip(e,r){
 tip.style.display="block";
 tip.innerHTML=`
 <b>${r.name}</b><br>
 From: ${r.inbound.join("/")}<br>
 To: ${r.outbound.join("/")}<br>
 ${r.status}
 `;
 tip.style.left=e.originalEvent.pageX+10+"px";
 tip.style.top=e.originalEvent.pageY+10+"px";
}

function closeSidebar(){
 document.getElementById("sidebar").classList.remove("active");
}

function openSidebar(r){
 document.getElementById("sidebar").classList.add("active");
 document.getElementById("content").innerHTML=`
 <h2>${r.name}</h2>
 <b>IATA:</b> ${r.iata}<br>
 <b>Status:</b> ${r.status}<br><br>

 <h3>Outbound</h3>${r.outbound.join(", ")}<br><br>
 <h3>Inbound</h3>${r.inbound.join(", ")}
 `;
}

/* ================= FILTERS ================= */
function toggleFilter(s){
 activeFilters[s]=!activeFilters[s];

 document.querySelectorAll("button").forEach(b=>{
  const t=b.innerText.trim();
  if(activeFilters[t]!==undefined){
   b.classList.toggle("on",activeFilters[t]);
  }
 });

 render();
}

/* ================= RENDER ================= */
function render(){

 lines.forEach(l=>map.removeLayer(l));
 markers.forEach(m=>map.removeLayer(m));

 lines=[];
 markers=[];

 DATA.forEach(r=>{

  if(!activeFilters[r.status]) return;

  const path=curve(hub,[r.lat,r.lon]);

  const line=L.polyline(path,{
   color:color(r.status),
   weight:3,
   opacity:0.9
  }).addTo(map);

  line.on("mousemove",(e)=>showTip(e,r));
  line.on("mouseout",()=>tip.style.display="none");
  line.on("click",()=>openSidebar(r));

  lines.push(line);

  const marker=L.circleMarker([r.lat,r.lon],{
   radius:6,
   color:"#111",
   fillColor:"#fff",
   fillOpacity:1
  }).addTo(map);

  marker.on("mousemove",(e)=>showTip(e,r));
  marker.on("mouseout",()=>tip.style.display="none");
  marker.on("click",()=>openSidebar(r));

  markers.push(marker);
 });

}

render();

</script>

</body>
</html>
